<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HomeFitly - Verifying...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      padding: 80px 24px;
      background: #f8f9fa;
      color: #333;
    }
    .container { max-width: 400px; margin: 0 auto; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { color: #4CAF50; font-size: 28px; margin-bottom: 12px; }
    p { font-size: 16px; color: #666; line-height: 1.5; margin-bottom: 12px; }
    .open-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 32px;
      background: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
    }
    .open-btn:active { background: #388E3C; }
    .secondary { font-size: 14px; color: #999; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🏠</div>
    <h1>HomeFitly</h1>
    <p id="status">Opening the app...</p>
    <a id="open-link" class="open-btn" style="display:none;">Open HomeFitly</a>
    <p id="fallback" class="secondary" style="display:none;">
      If the app didn't open, make sure HomeFitly is installed on this device.
    </p>
  </div>

  <script>
    // Capture hash fragment or query params from Supabase redirect
    var params = '';
    if (window.location.hash && window.location.hash.length > 1) {
      params = window.location.hash.substring(1); // remove #
    } else if (window.location.search && window.location.search.length > 1) {
      params = window.location.search.substring(1); // remove ?
    }

    if (params) {
      // Build the custom scheme URL with the params
      var appURL = 'homefitly://auth/callback?' + params;

      // Try to open the app immediately
      window.location.href = appURL;

      // After a delay, show the manual button as fallback
      setTimeout(function() {
        document.getElementById('status').textContent = 'Your email has been verified.';
        document.getElementById('open-link').href = appURL;
        document.getElementById('open-link').style.display = 'inline-block';
        document.getElementById('fallback').style.display = 'block';
      }, 2000);
    } else {
      // No params — just a plain visit
      document.getElementById('status').textContent = 'Your email has been verified. Open the HomeFitly app to continue.';
    }
  </script>
</body>
</html>
