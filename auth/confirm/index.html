<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HomeFitly - Verifying...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      padding: 80px 24px;
      background: #f8f9fa;
      color: #333;
    }
    .container { max-width: 400px; margin: 0 auto; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { color: #4CAF50; font-size: 28px; margin-bottom: 12px; }
    p { font-size: 16px; color: #666; line-height: 1.5; margin-bottom: 12px; }
    .open-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 32px;
      background: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
    }
    .open-btn:active { background: #388E3C; }
    .secondary { font-size: 14px; color: #999; margin-top: 16px; }
    .error { color: #d32f2f; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🏠</div>
    <h1>HomeFitly</h1>
    <p id="status">Verifying your email...</p>
    <a id="open-link" class="open-btn" style="display:none;">Open HomeFitly</a>
    <p id="fallback" class="secondary" style="display:none;">
      If the app didn't open, make sure HomeFitly is installed on this device.
    </p>
  </div>

  <script>
    // PKCE flow: Supabase sends token_hash and type as query params
    // We need to verify the token with Supabase, then redirect to the app

    var SUPABASE_URL = 'https://ahuuloxcpdcjciaqstok.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFodXVsb3hjcGRjamNpYXFzdG9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNzIyOTIsImV4cCI6MjA5NTg0ODI5Mn0.3Bq0ckjwlXxEOzuPsqn_WOjuCb6NW3BaCmZdqD8JeY4';

    var params = new URLSearchParams(window.location.search);
    var tokenHash = params.get('token_hash');
    var type = params.get('type');

    if (tokenHash && type) {
      // Call Supabase verify endpoint via POST
      fetch(SUPABASE_URL + '/auth/v1/verify', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({
          token_hash: tokenHash,
          type: type
        })
      })
      .then(function(response) { return response.json(); })
      .then(function(data) {
        if (data.access_token) {
          // Verification succeeded — redirect to app with tokens
          var appParams = 'access_token=' + encodeURIComponent(data.access_token)
            + '&refresh_token=' + encodeURIComponent(data.refresh_token)
            + '&type=' + encodeURIComponent(type);

          var appURL = 'homefitly://auth/callback?' + appParams;

          document.getElementById('status').textContent = 'Email verified! Opening the app...';
          window.location.href = appURL;

          // Fallback button after delay
          setTimeout(function() {
            document.getElementById('status').textContent = 'Your email has been verified.';
            document.getElementById('open-link').href = appURL;
            document.getElementById('open-link').style.display = 'inline-block';
            document.getElementById('fallback').style.display = 'block';
          }, 2000);
        } else {
          // Verification failed
          var msg = data.msg || data.error_description || 'Verification failed';
          document.getElementById('status').innerHTML = '<span class="error">' + msg + '</span><br><br>Please try signing in with your email and password, or request a new verification email.';
        }
      })
      .catch(function(err) {
        document.getElementById('status').innerHTML = '<span class="error">Network error. Please check your connection and try again.</span>';
      });
    } else {
      // No token params — check for hash fragment (non-PKCE flow fallback)
      var hashParams = '';
      if (window.location.hash && window.location.hash.length > 1) {
        hashParams = window.location.hash.substring(1);
      }
      if (hashParams) {
        var appURL = 'homefitly://auth/callback?' + hashParams;
        window.location.href = appURL;
        setTimeout(function() {
          document.getElementById('status').textContent = 'Your email has been verified.';
          document.getElementById('open-link').href = appURL;
          document.getElementById('open-link').style.display = 'inline-block';
          document.getElementById('fallback').style.display = 'block';
        }, 2000);
      } else {
        document.getElementById('status').textContent = 'Invalid or expired link. Please request a new verification email from the app.';
      }
    }
  </script>
</body>
</html>
