name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create env file
        run: |
          cat > .env << 'ENVEOF'
          VITE_SUPABASE_URL=https://ahuuloxcpdcjciaqstok.supabase.co
          VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFodXVsb3hjcGRjamNpYXFzdG9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNzIyOTIsImV4cCI6MjA5NTg0ODI5Mn0.3Bq0ckjwlXxEOzuPsqn_WOjuCb6NW3BaCmZdqD8JeY4
          VITE_GOOGLE_MAPS_API_KEY=AIzaSyCeyfVFiBCKD11_te_HzvSPK3HVljX0VD8
          ENVEOF
          sed -i 's/^          //' .env

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
